<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AGRIMILK Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fraunces:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">
        <h1>AGRIMILK</h1>
        <p>Interactive view of European dairy trade flows</p>
      </div>
      <div class="topbar-right">
        <div class="filters" id="filters"></div>
        <div class="product-dropdown">
          <button class="btn-products" id="btnProducts">Products ▼</button>
          <div class="product-dropdown-content" id="productDropdown">
            <input id="productSearch" type="search" placeholder="Search products" />
            <div class="product-list" id="productList"></div>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">
      <div class="map-product-container">
        <section class="panel map">
          <div class="panel-head">
            <h2>Europe map</h2>
            <div class="pill" id="mapLabel">Loading...</div>
          </div>
          <div class="chart" id="map"></div>
          <div class="legend" id="mapLegend"></div>
        </section>

        <section class="panel product">
          <div class="panel-head">
            <h2>Product focus</h2>
            <div class="pill" id="productLabel">Loading...</div>
          </div>
         <div>
  <h3>EU drill-down</h3>

  <!-- Nouveau: ligne avec pie + liste -->
  <div class="eu-row">
    <div class="chart" id="euPie"></div>
    <div class="eu-list" id="euList"></div>
  </div>

  <p class="note" id="euNote">Top 8 EU partners breakdown.</p>
</div>

          <div class="country-section">
            <div class="panel-head">
              <h3>Country details</h3>
              <div class="pill" id="countryLabel">Select a country</div>
            </div>
            <div>
              <h4>Share over time</h4>
              <div class="chart chart-small" id="countryLine"></div>
              <div class="line-legend" id="countryLineLegend"></div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div class="tooltip" id="tooltip"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
    <script src="app.js"></script>
  </body>
</html>
